version: "3.9"

services:
  judge0:
    image: judge0/judge0:1.13.1
    ports:
      - "2358:2358"
    environment:
      REDIS_HOST: judge0-redis
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0password
      # Security: no network egress from sandbox
      ALLOW_ENABLE_WAIT_RESULT: "true"
      MAX_QUEUE_SIZE: "100"
      MAX_CPU_TIME_LIMIT: "10"
      MAX_MEMORY_LIMIT: "262144"
    depends_on:
      - judge0-db
      - judge0-redis

  judge0-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0password
    volumes:
      - judge0_db:/var/lib/postgresql/data

  judge0-redis:
    image: redis:7-alpine
    volumes:
      - judge0_redis:/data

  judge0-worker:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    environment:
      REDIS_HOST: judge0-redis
      POSTGRES_HOST: judge0-db
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0password
    depends_on:
      - judge0
    privileged: true  # required for sandbox isolation; use gVisor runtime in prod

volumes:
  judge0_db:
  judge0_redis:
